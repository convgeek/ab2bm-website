<svg viewBox="0 0 700 500" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <filter id="abg2" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#0a0e1a" flood-opacity="0.06"/>
    </filter>
    <filter id="abN2" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#0a0e1a" flood-opacity="0.07"/>
    </filter>
    <filter id="abG2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="14" flood-color="#3b5bdb" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Card background -->
  <rect x="10" y="10" width="680" height="480" rx="20" fill="#f5f6f8" filter="url(#abg2)"/>

  <!-- Subtle radial lines from center to each node -->
  <line x1="350" y1="245" x2="206" y2="150" stroke="#3b5bdb" stroke-width="1.2" opacity="0.18"/>
  <line x1="350" y1="245" x2="494" y2="150" stroke="#3b5bdb" stroke-width="1.2" opacity="0.18"/>
  <line x1="350" y1="245" x2="222" y2="256" stroke="#3b5bdb" stroke-width="1.2" opacity="0.18"/>
  <line x1="350" y1="245" x2="478" y2="256" stroke="#3b5bdb" stroke-width="1.2" opacity="0.18"/>
  <line x1="350" y1="245" x2="213" y2="380" stroke="#3b5bdb" stroke-width="1.2" opacity="0.18"/>
  <line x1="350" y1="245" x2="487" y2="380" stroke="#3b5bdb" stroke-width="1.2" opacity="0.18"/>

  <!-- Dashed orbit rings -->
  <circle cx="350" cy="260" r="180" fill="none" stroke="#3b5bdb" stroke-width="0.7" opacity="0.06" stroke-dasharray="6,5"/>
  <circle cx="350" cy="260" r="132" fill="none" stroke="#3b5bdb" stroke-width="0.4" opacity="0.04" stroke-dasharray="4,4"/>

  <!-- ============================================ -->
  <!-- CENTER: YOUR IDEAL LEAD -->
  <!-- ============================================ -->
  <circle cx="350" cy="245" r="78" fill="#fff" filter="url(#abG2)" stroke="#3b5bdb" stroke-width="2"/>
  <circle cx="350" cy="245" r="66" fill="#3b5bdb" opacity="0.025"/>

  <text x="350" y="234" font-size="22" fill="#0a0e1a" text-anchor="middle" font-weight="800">Your Ideal</text>
  <text x="350" y="260" font-size="22" fill="#0a0e1a" text-anchor="middle" font-weight="800">Lead</text>
  <text x="350" y="280" font-size="8.5" fill="#6b7280" text-anchor="middle" letter-spacing="0.3">Targeted · Qualified</text>
  <text x="350" y="293" font-size="8.5" fill="#6b7280" text-anchor="middle" letter-spacing="0.3">Engaged</text>

  <!-- ============================================ -->
  <!-- ORBITING NODES — 6 concepts, no program names -->
  <!-- ============================================ -->

  <!-- 1. Opt-in lead generation (top-left) -->
  <rect x="48" y="74" width="200" height="76" rx="14" fill="#fff" filter="url(#abN2)"/>
  <text x="148" y="102" font-size="13" fill="#0a0e1a" text-anchor="middle" font-weight="700">Opt-In Lead Generation</text>
  <text x="148" y="120" font-size="9.5" fill="#6b7280" text-anchor="middle">Content syndication reaching</text>
  <text x="148" y="134" font-size="9.5" fill="#6b7280" text-anchor="middle">net-new top-of-funnel prospects</text>
  <circle cx="206" cy="150" r="4" fill="#3b5bdb" opacity="0.15"/>

  <!-- 2. Buying committee engagement (top-right) -->
  <rect x="452" y="74" width="200" height="76" rx="14" fill="#fff" filter="url(#abN2)"/>
  <text x="552" y="102" font-size="13" fill="#0a0e1a" text-anchor="middle" font-weight="700">Buying Committees</text>
  <text x="552" y="120" font-size="9.5" fill="#6b7280" text-anchor="middle">Account-based engagement</text>
  <text x="552" y="134" font-size="9.5" fill="#6b7280" text-anchor="middle">across named target accounts</text>
  <circle cx="494" cy="150" r="4" fill="#3b5bdb" opacity="0.15"/>

  <!-- 3. Install-base targeting (left) -->
  <rect x="22" y="232" width="200" height="76" rx="14" fill="#fff" filter="url(#abN2)"/>
  <text x="122" y="260" font-size="13" fill="#0a0e1a" text-anchor="middle" font-weight="700">Install-Base Targeting</text>
  <text x="122" y="278" font-size="9.5" fill="#6b7280" text-anchor="middle">Leads at organizations running</text>
  <text x="122" y="292" font-size="9.5" fill="#6b7280" text-anchor="middle">the specific tech you need</text>
  <circle cx="222" cy="256" r="4" fill="#3b5bdb" opacity="0.15"/>

  <!-- 4. Sales-ready qualification (right) -->
  <rect x="478" y="232" width="200" height="76" rx="14" fill="#fff" filter="url(#abN2)"/>
  <text x="578" y="260" font-size="13" fill="#0a0e1a" text-anchor="middle" font-weight="700">Sales-Ready Leads</text>
  <text x="578" y="278" font-size="9.5" fill="#6b7280" text-anchor="middle">Qualified on budget, authority,</text>
  <text x="578" y="292" font-size="9.5" fill="#6b7280" text-anchor="middle">need, and timing</text>
  <circle cx="478" cy="256" r="4" fill="#3b5bdb" opacity="0.15"/>

  <!-- 5. Customer expansion (bottom-left) -->
  <rect x="78" y="380" width="200" height="76" rx="14" fill="#fff" filter="url(#abN2)"/>
  <text x="178" y="408" font-size="13" fill="#0a0e1a" text-anchor="middle" font-weight="700">Customer Expansion</text>
  <text x="178" y="426" font-size="9.5" fill="#6b7280" text-anchor="middle">Cross-sell and upsell into new</text>
  <text x="178" y="440" font-size="9.5" fill="#6b7280" text-anchor="middle">decision-makers at existing accounts</text>
  <circle cx="213" cy="380" r="4" fill="#3b5bdb" opacity="0.15"/>

  <!-- 6. Content creation (bottom-right) -->
  <rect x="422" y="380" width="200" height="76" rx="14" fill="#fff" filter="url(#abN2)"/>
  <text x="522" y="408" font-size="13" fill="#0a0e1a" text-anchor="middle" font-weight="700">Content Creation</text>
  <text x="522" y="426" font-size="9.5" fill="#6b7280" text-anchor="middle">eBooks, webinars, and assets</text>
  <text x="522" y="440" font-size="9.5" fill="#6b7280" text-anchor="middle">that fuel every program</text>
  <circle cx="487" cy="380" r="4" fill="#3b5bdb" opacity="0.15"/>
</svg>
